<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字与音频播放</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>点击文字播放音频</h1>
        
        <div class="content">
            <div class="text" data-audio="audio1.mp3">
                <p>这是第一段文字。点击播放对应的音频。</p>
            </div>
            <div class="text" data-audio="audio2.mp3">
                <p>这是第二段文字。点击播放对应的音频。</p>
            </div>
            <div class="text" data-audio="audio3.mp3">
                <p>这是第三段文字。点击播放对应的音频。</p>
            </div>
        </div>
        
        <audio id="audioPlayer" controls style="display:none;">
            <source id="audioSource" src="" type="audio/mp3">
            您的浏览器不支持音频播放。
        </audio>
    </div>

    <script src="script.js"></script>
</body>
</html>
