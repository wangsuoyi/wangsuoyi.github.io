<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音频播放网页</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>欢迎来到音频播放网页</h1>
        <div class="text-item" onclick="playAudio('audio1')">
            <p>第一段文字描述</p>
        </div>
        <div class="text-item" onclick="playAudio('audio2')">
            <p>第二段文字描述</p>
        </div>
        <div class="text-item" onclick="playAudio('audio3')">
            <p>第三段文字描述</p>
        </div>
    </div>

    <!-- 隐藏的音频文件 -->
    <audio id="audio1" src="audio/audio1.mp3"></audio>
    <audio id="audio2" src="audio/audio2.mp3"></audio>
    <audio id="audio3" src="audio/audio3.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
