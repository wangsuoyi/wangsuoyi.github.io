<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>audio player</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="audio-section">
            <h2>音频播放</h2>
            <!-- 显示参考文本 -->
            <textarea id="audioText" class="audio-text" readonly>
            这是音频的参考文本，您可以在这里添加更多的内容。它会自动换行。
            </textarea>

            <!-- 播放/暂停按钮 -->
            <div class="controls">
                <button id="playPauseBtn" class="play-btn">播放</button>
            </div>

            <!-- 进度条 -->
            <input type="range" id="progressBar" class="progress-bar" value="0" step="1" min="0" max="100" />
            
            <!-- 多段音频控制 -->
            <div id="audioButtons">
                <button class="audio-segment-btn" data-index="0">段落 1</button>
                <button class="audio-segment-btn" data-index="1">段落 2</button>
                <button class="audio-segment-btn" data-index="2">段落 3</button>
            </div>
            
            <!-- 版权声明 -->
            <footer class="footer">
                <p>© 2024 版权所有 | 设计和开发: 你的名字</p>
            </footer>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
