<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音频播放网页</title>
  <link rel="stylesheet" href="css/styles.css"> <!-- 引用CSS文件 -->
</head>
<body>

  <header>
    <img src="images/logo.png" alt="Logo" id="logo">
  </header>

  <main>
    <section class="content">
      <!-- 每段文字下面放置一个音频控制面板 -->
      <div class="audio-item">
        <p class="audio-text" data-audio="audio/audio1.mp3">这是一个测试用低音</p>
        <div class="audio-player">
          <button class="play-pause-btn">播放</button>
          <input type="range" class="audio-progress" value="0" step="1" min="0" max="100">
          <span class="audio-time">0:00</span>
        </div>
      </div>

      <div class="audio-item">
        <p class="audio-text" data-audio="audio/audio2.mp3">这是一支钢琴曲</p>
        <div class="audio-player">
          <button class="play-pause-btn">播放</button>
          <input type="range" class="audio-progress" value="0" step="1" min="0" max="100">
          <span class="audio-time">0:00</span>
        </div>
      </div>

      <div class="audio-item">
        <p class="audio-text" data-audio="audio/audio3.mp3">这是一段文字3，点击播放音频3</p>
        <div class="audio-player">
          <button class="play-pause-btn">播放</button>
          <input type="range" class="audio-progress" value="0" step="1" min="0" max="100">
          <span class="audio-time">0:00</span>
        </div>
      </div>

      <!-- 可以继续添加其他段落 -->
    </section>
  </main>

  <footer>
    <p>&copy; 2024 Wang Suoyi. All rights reserved.</p>
  </footer>

  <script src="js/script.js"></script> <!-- 引用JavaScript文件 -->
</body>
</html>
