<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本与音频模块</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="text-audio-module">
            <p class="text">石头很小，山群很大，生命繁忙。</p>
            <audio class="audio" src="audio/audio1.mp3"></audio>
            <div class="audio-controls">
                <button class="play-pause-btn">播放</button>
                <input type="range" class="progress-bar" value="0" max="100">
            </div>
        </div>

        <div class="text-audio-module">
            <p class="text">时间在头顶上的云层上空飘逝，断崖坐落在一个地方，从来没有移动过。</p>
            <audio class="audio" src="audio/audio2.mp3"></audio>
            <div class="audio-controls">
                <button class="play-pause-btn">播放</button>
                <input type="range" class="progress-bar" value="0" max="100">
            </div>
        </div>

        <div class="text-audio-module">
            <p class="text">朴素的断崖远离了灯火的辉煌，坚强的断崖支撑着深情的凝视。</p>
            <audio class="audio" src="audio/audio3.mp3"></audio>
            <div class="audio-controls">
                <button class="play-pause-btn">播放</button>
                <input type="range" class="progress-bar" value="0" max="100">
            </div>
        </div>

        <div class="text-audio-module">
            <p class="text">我的呼吸在灯光的波纹里，遥遥地望着村庄边畔的断崖，断崖仍然在它的世界里。断崖的形象在我的意念里。我为它在我的思维里安排了一个位置，支撑起我的信念，滤得我的目光越来越纯净。</p>
            <audio class="audio" src="audio/audio4.mp3"></audio>
            <div class="audio-controls">
                <button class="play-pause-btn">播放</button>
                <input type="range" class="progress-bar" value="0" max="100">
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
